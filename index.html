<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veloura | Beauty & Fragrance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CONFIGURATION — CHANGE YOUR TAG HERE ONLY
   ═══════════════════════════════════════════ */

:root {
  --gold: #c9a96e;
  --gold-light: #e8d4a8;
  --gold-dim: rgba(201,169,110,0.2);
  --black: #080808;
  --charcoal: #111010;
  --surface: #141210;
  --cream: #f5f0e8;
  --muted: rgba(245,240,232,0.45);
  --muted2: rgba(245,240,232,0.18);
  --red: #c96e6e;
  --green: #6ec98a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;cursor:none}

/* ── CURSOR ── */
#cursor{width:10px;height:10px;background:var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s;mix-blend-mode:screen}
#cursor-ring{width:36px;height:36px;border:1px solid rgba(201,169,110,.5);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .18s ease}
body.hovering #cursor{width:18px;height:18px}
body.hovering #cursor-ring{width:54px;height:54px;border-color:var(--gold)}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:28px 60px;display:flex;align-items:center;justify-content:space-between;transition:padding .4s,background .4s,backdrop-filter .4s}
nav.scrolled{padding:18px 60px;background:rgba(8,8,8,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,169,110,.1)}
.nav-logo{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:600;letter-spacing:.35em;color:var(--cream);text-decoration:none;cursor:pointer;user-select:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:44px;list-style:none}
.nav-links a{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s}
.nav-links a:hover{color:var(--gold)}
.nav-links a:hover::after{width:100%}
.nav-cta{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:10px 24px;text-decoration:none;font-weight:500;transition:all .3s;border-radius:1px}
.nav-cta:hover{background:var(--gold-light);transform:translateY(-1px)}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,169,110,.06) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(201,169,110,.04) 0%,transparent 50%),linear-gradient(170deg,#0d0b09 0%,#080808 50%,#0a0908 100%)}
.hero-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orb-float 8s ease-in-out infinite}
@keyframes orb-float{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-46%,-54%) scale(1.12);opacity:1}}
.particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;width:1px;height:1px;background:var(--gold);border-radius:50%;animation:particle-rise linear infinite;opacity:0}
@keyframes particle-rise{0%{opacity:0;transform:translateY(0) scale(0)}10%{opacity:.8}90%{opacity:.3}100%{opacity:0;transform:translateY(-120vh) scale(2)}}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 40px;max-width:1000px}
.hero-eyebrow{font-size:10px;letter-spacing:.55em;text-transform:uppercase;color:var(--gold);margin-bottom:32px;display:block;opacity:0;transform:translateY(20px);animation:fade-up 1s ease .3s forwards}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3.2rem,8vw,7rem);font-weight:400;line-height:1.05;color:var(--cream);margin-bottom:32px;opacity:0;transform:translateY(30px);animation:fade-up 1.1s ease .5s forwards}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-title .outline{-webkit-text-stroke:1px rgba(245,240,232,.25);color:transparent}
.hero-sub{font-size:clamp(.85rem,1.5vw,1rem);color:var(--muted);letter-spacing:.08em;line-height:1.9;max-width:540px;margin:0 auto 48px;opacity:0;transform:translateY(20px);animation:fade-up 1.1s ease .7s forwards}
.hero-actions{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;opacity:0;transform:translateY(20px);animation:fade-up 1.1s ease .9s forwards}
.btn-primary{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:16px 40px;text-decoration:none;font-weight:500;transition:all .3s;border:1px solid var(--gold);border-radius:1px}
.btn-primary:hover{background:transparent;color:var(--gold);transform:translateY(-2px)}
.btn-ghost{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--cream);padding:16px 40px;text-decoration:none;transition:all .3s;border:1px solid rgba(245,240,232,.2);border-radius:1px}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px)}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fade-up 1s ease 1.4s forwards}
.hero-scroll span{font-size:8px;letter-spacing:.45em;text-transform:uppercase;color:var(--muted)}
.scroll-line{width:1px;height:50px;background:linear-gradient(180deg,var(--gold),transparent);animation:scroll-pulse 2s ease-in-out infinite}
@keyframes scroll-pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fade-up{to{opacity:1;transform:translateY(0)}}

/* ── MARQUEE ── */
.marquee-wrap{border-top:1px solid rgba(201,169,110,.15);border-bottom:1px solid rgba(201,169,110,.15);background:var(--surface);padding:18px 0;overflow:hidden}
.marquee-track{display:flex;width:max-content;animation:marquee-scroll 30s linear infinite}
.marquee-track:hover{animation-play-state:paused}
.marquee-item{display:flex;align-items:center;gap:20px;padding:0 48px;white-space:nowrap;font-size:9px;letter-spacing:.45em;text-transform:uppercase;color:var(--muted)}
.marquee-item .dot{width:3px;height:3px;background:var(--gold);border-radius:50%;flex-shrink:0}
@keyframes marquee-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── SECTIONS ── */
section{padding:120px 60px}
.section-eyebrow{font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:20px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.15;color:var(--cream);margin-bottom:20px}
.section-title em{font-style:italic;color:var(--gold)}
.section-sub{font-size:.9rem;color:var(--muted);line-height:1.8;max-width:500px}
.gold-line{width:48px;height:1px;background:var(--gold);margin:28px 0}

/* ── PRODUCTS ── */
#products{position:relative}
#products .section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:64px}
.category-section { margin-bottom: 70px; }
.category-header { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; color: var(--gold-light); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid rgba(201,169,110,0.15); display: flex; align-items: center; justify-content: space-between; }
.category-count { font-family: 'DM Sans', sans-serif; font-size: 10px; font-style: normal; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;min-height:200px}
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;border:1px dashed rgba(201,169,110,.2);gap:16px;cursor:pointer;transition:all .3s;border-radius:4px}
.empty-state:hover{border-color:var(--gold);background:rgba(201,169,110,.04)}
.empty-state .es-icon{font-size:2.5rem;filter:saturate(.4)}
.empty-state .es-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--cream)}
.empty-state .es-sub{font-size:.82rem;color:var(--muted);text-align:center;max-width:320px;line-height:1.7}
.empty-state .es-cta{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:10px 24px;margin-top:8px;transition:all .3s}
.empty-state .es-cta:hover{background:var(--gold);color:var(--black)}

.product-card{background:var(--surface);position:relative;overflow:hidden;cursor:pointer;border:1px solid rgba(201,169,110,.07);transition:border-color .4s}
.product-card:hover{border-color:rgba(201,169,110,.3)}
.product-card:hover .product-img-wrap{transform:scale(1.04)}
.product-card:hover .product-overlay{opacity:1}
.product-img-wrap{height:260px;background:linear-gradient(135deg,#1c1510 0%,#241a12 100%);display:flex;align-items:center;justify-content:center;transition:transform .6s cubic-bezier(.25,.8,.25,1);position:relative;overflow:hidden}
.product-img-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 30%,rgba(201,169,110,.08) 0%,transparent 70%)}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.product-emoji-fallback{font-size:4rem;filter:saturate(.7);position:relative;z-index:1}
.product-badge{position:absolute;top:14px;left:14px;font-size:7px;letter-spacing:.35em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:5px 10px;font-weight:600;z-index:2}
.product-overlay{position:absolute;inset:0;background:rgba(8,8,8,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .35s;z-index:3}
.product-overlay-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
.product-overlay-text{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--cream);border:1px solid rgba(245,240,232,.4);padding:10px 22px;transition:all .3s;text-decoration:none}
.product-overlay-text:hover{background:var(--gold);border-color:var(--gold);color:var(--black)}
/* REMOVED: .product-remove-btn styles */

.product-info{padding:24px;border-top:1px solid rgba(201,169,110,.1)}
.product-brand-tag{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;display:block}
.product-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:400;color:var(--cream);line-height:1.3;margin-bottom:12px}
.product-meta{display:flex;align-items:center;justify-content:space-between}
.product-price{font-size:.85rem;color:var(--gold-light);font-weight:500}
.product-stars{font-size:.7rem;color:var(--gold);letter-spacing:2px}
.product-asin{font-size:7px;color:var(--muted2);margin-top:8px;letter-spacing:.1em}

/* ... existing sections about/pillars/etc omitted for space ... */

/* ════════════════════════════════
   ADMIN PANEL
════════════════════════════════ */
/* ... existing admin styles ... */
</style>
</head>
<body>
<script>
/* ... existing JS setup ... */

/* ═══════════════════════════════════════ PRODUCT RENDERING ═══════════════════════════════════════ */
function renderProducts() {
  const container = document.getElementById('products-container');
  if(!container) return;
  container.innerHTML = '';

  const cats = [
    "Everyday Skin Care Tips", "Top Makeup Picks", "Perfume & Fragrance Picks",
    "Nail & Hand Care Must-Haves", "Healthy Hair Care Routines",
    "Growth Tips", "Best Hair Tools on Amazon", "Best Amazon Finds"
  ];

  cats.forEach(cat => {
    const catProducts = products.filter(p => p.category === cat);
    if(catProducts.length === 0) return;

    const catSection = document.createElement('div');
    catSection.className = 'category-section reveal';
    catSection.innerHTML = `
      <div class="category-header">
        <span>${cat}</span>
        <span class="category-count">${catProducts.length} Items</span>
      </div>
      <div class="products-grid"></div>
    `;
    const grid = catSection.querySelector('.products-grid');

    catProducts.forEach((p) => {
      const link = buildAffiliateLink(p.asin);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-img-wrap">
          ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<span class="product-emoji-fallback">${p.emoji || '✨'}</span>`}
          ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
          <div class="product-overlay">
            <div class="product-overlay-inner">
              <a href="${link}" target="_blank" rel="noopener" class="product-overlay-text">Shop on Amazon →</a>
              </div>
          </div>
        </div>
        <div class="product-info">
          <span class="product-brand-tag">${p.brand}</span>
          <div class="product-name">${p.name}</div>
          <div class="product-meta">
            <span class="product-price">${p.price}</span>
            <span class="product-stars">${renderStars(p.stars)}</span>
          </div>
          <div class="product-asin">ASIN: ${p.asin}</div>
        </div>`;
      grid.appendChild(card);
    });
    container.appendChild(catSection);
  });
  
  // NOTE: Delete logic is now exclusively handled in the "Manage" tab of the Admin Panel.
}

/* ... existing admin panel/settings/delete logic for manage tab ... */
</script>
</body>
</html>
