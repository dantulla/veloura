<!-- Add Social Proof field to Add Product Form -->
<div class="form-grid single">
  <div class="form-field">
    <label class="form-label">Social Proof</label>
    <input type="text" class="form-input" id="f-socialproof" placeholder="e.g. 1,000+ saves · 800 reviews · 4.8★ avg.">
  </div>

<!-- (existing markup unchanged up to script) -->
<script>
/* (existing JS before unchanged) */

// Update the Add Product event handler to capture social proof
// (Find document.getElementById('add-product-btn').addEventListener('click', ...)
document.getElementById('add-product-btn').addEventListener('click', () => {
  const brand = document.getElementById('f-brand').value.trim();
  const name  = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const image = document.getElementById('f-image').value.trim();
  const badge = document.getElementById('f-badge').value.trim();
  const category = document.getElementById('f-category').value;
  const stars = parseFloat(document.getElementById('f-stars').value);
  const emoji = document.getElementById('f-emoji').value.trim() || '✨';
  const socialProof = document.getElementById('f-socialproof').value.trim();

  if(!brand||!name||!price) {
    alert('Please fill in Brand, Product Name, and Price.');
    return;
  }
  if(!extractedASIN) {
    alert('Please extract an ASIN from the Amazon URL first.');
    return;
  }

  const product = {
    asin:     extractedASIN,
    brand:    brand,
    name:     name,
    price:    price,
    imageUrl: image,
    badge:    badge,
    category: category,
    stars:    stars,
    emoji:    emoji,
    socialProof: socialProof,
    addedAt:  new Date().toISOString()
  };

  products.push(product);
  STORE.set('vl_products', products);

  document.getElementById('form-success').style.display='block';
  document.getElementById('add-product-btn').disabled=true;
  setTimeout(() => {
    document.getElementById('form-success').style.display='none';
    resetAddForm();
  }, 3000);
});

// Update renderProducts to display social proof
function renderProducts() {
  const container = document.getElementById('products-container');
  container.innerHTML = '';

  if(products.length === 0) {
    container.innerHTML = `
      <div class="empty-state" id="empty-state-btn">
        <span class="es-icon">✦</span>
        <div class="es-title">Your Edit is Empty</div>
        <p class="es-sub">Press Ctrl+Shift+A (or click the logo 5 times) to open the admin panel, paste an Amazon URL, and your first product will appear right here.</p>
        <span class="es-cta">Open Admin Panel</span>
      </div>`;
    document.getElementById('empty-state-btn').addEventListener('click', openAdmin);
    return;
  }

  const categories = [...new Set(products.map(p => p.category))];

  categories.forEach(cat => {
    const catProducts = products.filter(p => p.category === cat);
    const catSection = document.createElement('div');
    catSection.className = 'category-section';
    catSection.innerHTML = `
      <div class="category-header">
        <span>${cat}</span>
        <span class="category-count">${catProducts.length} Items</span>
      </div>
      <div class="products-grid"></div>
    `;
    const grid = catSection.querySelector('.products-grid');
    catProducts.forEach((p) => {
      const globalIdx = products.indexOf(p);
      const link = buildAffiliateLink(p.asin);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-img-wrap">
          ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<span class="product-emoji-fallback">${p.emoji || '✨'}</span>`}
          ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
          <div class="product-overlay">
            <div class="product-overlay-inner">
              <a href="${link}" target="_blank" rel="noopener" class="product-overlay-text">Shop on Amazon →</a>
              <button class="product-remove-btn" data-idx="${globalIdx}">Remove</button>
            </div>
          </div>
        </div>
        <div class="product-info">
          <span class="product-brand-tag">${p.brand}</span>
          <div class="product-name">${p.name}</div>
          <div class="product-meta">
            <span class="product-price">${p.price}</span>
            <span class="product-stars">${renderStars(p.stars)}</span>
          </div>
          ${p.socialProof ? `<div class="product-social-proof">${p.socialProof}</div>` : ''}
          <div class="product-asin">ASIN: ${p.asin}</div>
        </div>`;
      grid.appendChild(card);
    });
    container.appendChild(catSection);
  });
  document.querySelectorAll('.product-remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(btn.dataset.idx);
      products.splice(i, 1);
      STORE.set('vl_products', products);
      renderProducts();
      renderManage();
    });
  });
}

// (rest of JS unchanged)
</script>
