<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veloura | Beauty & Fragrance Authority</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── ROOT & THEME ── */
:root {
  --gold: #c9a96e;
  --gold-light: #e8d4a8;
  --black: #080808;
  --surface: #141210;
  --cream: #f5f0e8;
  --muted: rgba(245,240,232,0.45);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;cursor:none}

/* ── HIGH VISIBILITY CURSOR ── */
#v-cursor {
    width: 8px; height: 8px; background: var(--gold); border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 10001;
    transition: transform 0.1s ease-out, opacity 0.3s ease;
    mix-blend-mode: exclusion;
}
#v-cursor-ring {
    width: 35px; height: 35px; border: 1px solid var(--gold); border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 10000;
    transition: width 0.3s ease, height 0.3s ease;
    mix-blend-mode: exclusion;
}
body.v-hovering #v-cursor-ring { width: 60px; height: 60px; background: rgba(201, 169, 110, 0.1); }

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:28px 60px;display:flex;align-items:center;justify-content:space-between;transition:all .4s}
nav.scrolled{padding:18px 60px;background:rgba(8,8,8,.9);backdrop-filter:blur(20px);}
.nav-logo{font-family:'Cinzel',serif;font-size:1.3rem;letter-spacing:.3em;color:var(--cream);text-decoration:none;}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle at 20% 50%,rgba(201,169,110,.05),transparent), #080808;}
.hero-content{text-align:center;z-index:2;padding:0 20px;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3rem,8vw,6.5rem);margin-bottom:20px;}
.hero-title em{color:var(--gold);font-style:italic;}
.hero-sub{font-size:1rem;color:var(--muted);max-width:500px;margin:0 auto 40px;line-height:1.8;}

/* ── PRODUCT GRID ── */
section{padding:100px 60px}
.category-section { margin-bottom: 80px; }
.category-header { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold-light); border-bottom: 1px solid rgba(201,169,110,0.2); padding-bottom: 15px; margin-bottom: 30px; display:flex; justify-content:space-between; align-items:center;}
.category-count { font-family: 'DM Sans'; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
.products-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:30px}

.product-card{background:var(--surface);border:1px solid rgba(201,169,110,0.1);transition:0.4s;}
.product-card:hover{border-color:var(--gold);}
.product-img-wrap{height:300px;position:relative;overflow:hidden;background:#1a1714;}
.product-img-wrap img{width:100%; height:100%; object-fit:cover;}
.product-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:0.3s;}
.product-card:hover .product-overlay{opacity:1;}
.shop-btn{background:var(--gold);color:black;padding:12px 24px;text-decoration:none;font-size:11px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;}
.product-info{padding:20px;}
.product-brand{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;display:block;}
.product-name{font-family:'Playfair Display';font-size:1.2rem;margin-bottom:10px;}
.product-price{color:var(--gold-light);font-weight:500;}

/* ── ADMIN PANEL ── */
#admin-overlay{position:fixed;inset:0;z-index:10000;background:rgba(8,8,8,0.98);backdrop-filter:blur(20px);display:none;padding:50px;}
#admin-overlay.open{display:flex; flex-direction:column; align-items:center; overflow-y:auto;}
.admin-wrap{width:100%; max-width:800px; background:#111; padding:40px; border:1px solid var(--gold);}
.form-field{margin-bottom:20px;}
.form-label{display:block; font-size:10px; color:var(--gold); text-transform:uppercase; margin-bottom:8px;}
.form-input, .form-select{width:100%; padding:12px; background:#1a1a1a; border:1px solid #333; color:white; outline:none;}
.add-btn{width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; text-transform:uppercase;}
.manage-item{display:flex; align-items:center; gap:20px; padding:15px; border-bottom:1px solid #222;}
.del-btn{background:#c96e6e; border:none; color:white; padding:5px 10px; cursor:pointer;}

/* ── DISCLOSURE ── */
footer{padding:60px; text-align:center; border-top:1px solid #222; font-size:11px; color:var(--muted); letter-spacing:1px;}

@media(max-width:768px){ section{padding:60px 20px;} body{cursor:auto;} #v-cursor, #v-cursor-ring{display:none;} }
</style>
</head>
<body>

<div id="v-cursor"></div>
<div id="v-cursor-ring"></div>

<nav id="nav">
  <a href="#" class="nav-logo" id="logo-trigger">VELO<span>U</span>RA</a>
  <ul class="nav-links">
    <li><a href="#hero">Home</a></li>
    <li><a href="#products">The Edit</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-content">
    <h1 class="hero-title">Timeless <em>Beauty.</em></h1>
    <p class="hero-sub">A curated selection of the world's most effective beauty rituals and fragrances.</p>
  </div>
</section>

<section id="products">
  <div id="products-container">
    </div>
</section>

<footer>
  <p>© 2026 VELOURA. AS AN AMAZON ASSOCIATE I EARN FROM QUALIFYING PURCHASES.</p>
</footer>

<div id="admin-overlay">
  <div class="admin-wrap">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h2 style="font-family:'Cinzel';">ADMIN PANEL</h2>
        <button onclick="closeAdmin()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; cursor:pointer;">CLOSE</button>
    </div>

    <div id="admin-gate">
        <input type="password" id="gate-pass" class="form-input" placeholder="Enter Password">
        <button onclick="unlockAdmin()" class="add-btn" style="margin-top:10px;">Login</button>
    </div>

    <div id="admin-content" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:30px;">
            <button onclick="showTab('add')" class="add-btn" style="width:auto; padding:10px 20px;">Add Product</button>
            <button onclick="showTab('manage')" class="add-btn" style="width:auto; padding:10px 20px; background:#333;">Manage All</button>
        </div>

        <div id="tab-add">
            <div class="form-field"><label class="form-label">Amazon URL</label><input type="text" id="f-url" class="form-input" placeholder="Paste link..."></div>
            <div class="form-field">
                <label class="form-label">Category</label>
                <select id="f-category" class="form-select">
                    <option>Everyday Skin Care Tips</option>
                    <option>Top Makeup Picks</option>
                    <option>Perfume & Fragrance Picks</option>
                    <option>Nail & Hand Care Must-Haves</option>
                    <option>Healthy Hair Care Routines</option>
                    <option>Growth Tips</option>
                    <option>Best Hair Tools on Amazon</option>
                    <option>Best Amazon Finds</option>
                </select>
            </div>
            <div class="form-field"><label class="form-label">Product Name</label><input type="text" id="f-name" class="form-input"></div>
            <div class="form-field"><label class="form-label">Brand</label><input type="text" id="f-brand" class="form-input"></div>
            <div class="form-field"><label class="form-label">Price</label><input type="text" id="f-price" class="form-input" placeholder="$0.00"></div>
            <div class="form-field"><label class="form-label">Image URL</label><input type="text" id="f-img" class="form-input"></div>
            <button onclick="addProduct()" class="add-btn">Publish to Site</button>
        </div>

        <div id="tab-manage" style="display:none;">
            <div id="manage-list"></div>
        </div>
    </div>
  </div>
</div>

<script>
/* ── DATA STORAGE ── */
let products = JSON.parse(localStorage.getItem('veloura_prods')) || [];
const AFFILIATE_TAG = 'rpamazon0db-20'; // CHANGE THIS TO YOURS

/* ── CURSOR LOGIC ── */
const dot = document.getElementById('v-cursor');
const ring = document.getElementById('v-cursor-ring');
let mX = 0, mY = 0, rX = 0, rY = 0;

document.addEventListener('mousemove', e => {
    mX = e.clientX; mY = e.clientY;
    dot.style.transform = `translate(${mX}px, ${mY}px) translate(-50%, -50%)`;
});

function animate() {
    rX += (mX - rX) * 0.15; rY += (mY - rY) * 0.15;
    ring.style.transform = `translate(${rX}px, ${rY}px) translate(-50%, -50%)`;
    requestAnimationFrame(animate);
}
animate();

document.addEventListener('mouseover', e => {
    if(e.target.closest('a, button, input, select')) document.body.classList.add('v-hovering');
    else document.body.classList.remove('v-hovering');
});

/* ── ADMIN LOGIC ── */
function openAdmin() { document.getElementById('admin-overlay').classList.add('open'); }
function closeAdmin() { document.getElementById('admin-overlay').classList.remove('open'); renderSite(); }

document.addEventListener('keydown', e => {
    if((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'a') openAdmin();
});

function unlockAdmin() {
    if(document.getElementById('gate-pass').value === 'veloura2025') {
        document.getElementById('admin-gate').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
    }
}

function showTab(tab) {
    document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
    document.getElementById('tab-manage').style.display = tab === 'manage' ? 'block' : 'none';
    if(tab === 'manage') renderManage();
}

function addProduct() {
    const url = document.getElementById('f-url').value;
    const asinMatch = url.match(/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
    if(!asinMatch) return alert("Invalid Amazon Link");

    const p = {
        id: Date.now(),
        asin: asinMatch[1],
        name: document.getElementById('f-name').value,
        brand: document.getElementById('f-brand').value,
        price: document.getElementById('f-price').value,
        img: document.getElementById('f-img').value,
        category: document.getElementById('f-category').value
    };
    products.push(p);
    localStorage.setItem('veloura_prods', JSON.stringify(products));
    alert("Added!");
    showTab('manage');
}

function deleteProduct(id) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem('veloura_prods', JSON.stringify(products));
    renderManage();
}

/* ── RENDERING ── */
function renderSite() {
    const container = document.getElementById('products-container');
    container.innerHTML = '';
    const categories = [...new Set(products.map(p => p.category))];
    
    categories.forEach(cat => {
        const catProds = products.filter(p => p.category === cat);
        const section = document.createElement('div');
        section.className = 'category-section';
        section.innerHTML = `
            <div class="category-header">
                <span>${cat}</span>
                <span class="category-count">${catProds.length} Items</span>
            </div>
            <div class="products-grid">
                ${catProds.map(p => `
                    <div class="product-card">
                        <div class="product-img-wrap">
                            <img src="${p.img || 'https://via.placeholder.com/300'}">
                            <div class="product-overlay">
                                <a href="https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_TAG}" target="_blank" class="shop-btn">Shop on Amazon</a>
                            </div>
                        </div>
                        <div class="product-info">
                            <span class="product-brand">${p.brand}</span>
                            <h3 class="product-name">${p.name}</h3>
                            <div class="product-price">${p.price}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(section);
    });
}

function renderManage() {
    const list = document.getElementById('manage-list');
    list.innerHTML = products.map(p => `
        <div class="manage-item">
            <img src="${p.img}" style="width:40px; height:40px; object-fit:cover;">
            <div style="flex:1;">
                <div style="font-size:12px; font-weight:bold;">${p.name}</div>
                <div style="font-size:10px; color:var(--gold);">${p.category}</div>
            </div>
            <button onclick="deleteProduct(${p.id})" class="del-btn">Remove</button>
        </div>
    `).join('');
}

window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});

renderSite();
</script>
</body>
</html>
