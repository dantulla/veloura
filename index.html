<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veloura | Beauty & Fragrance Authority</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT CONFIGURATION
   ═══════════════════════════════════════════ */
:root {
  --gold: #c9a96e;
  --gold-light: #e8d4a8;
  --gold-dim: rgba(201,169,110,0.2);
  --black: #080808;
  --charcoal: #111010;
  --surface: #141210;
  --cream: #f5f0e8;
  --muted: rgba(245,240,232,0.45);
  --muted2: rgba(245,240,232,0.18);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;cursor:none} /* Hide default cursor */

/* ── NEW EXCLUSION CURSOR ── */
#v-cursor {
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 10001;
    transition: transform 0.1s ease-out, opacity 0.3s ease;
    mix-blend-mode: exclusion; /* High visibility on all backgrounds */
}
#v-cursor-ring {
    width: 35px;
    height: 35px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 10000;
    transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    mix-blend-mode: exclusion;
}
body.v-hovering #v-cursor { transform: scale(0.5); opacity: 0.5; }
body.v-hovering #v-cursor-ring { width: 60px; height: 60px; background: rgba(201, 169, 110, 0.1); border-color: var(--cream); }

@media (hover: none) and (pointer: coarse) {
    #v-cursor, #v-cursor-ring { display: none; }
    body { cursor: auto; }
}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:28px 60px;display:flex;align-items:center;justify-content:space-between;transition:all .4s}
nav.scrolled{padding:18px 60px;background:rgba(8,8,8,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,169,110,.1)}
.nav-logo{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:600;letter-spacing:.35em;color:var(--cream);text-decoration:none;cursor:pointer}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:44px;list-style:none}
.nav-links a{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;position:relative}
.nav-links a:hover{color:var(--gold)}
.nav-cta{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:10px 24px;text-decoration:none;font-weight:500;border-radius:1px}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,169,110,.06) 0%,transparent 55%),linear-gradient(170deg,#0d0b09 0%,#080808 100%)}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 40px;max-width:1000px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3.2rem,8vw,7rem);font-weight:400;line-height:1.05;color:var(--cream);margin-bottom:32px}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:clamp(.85rem,1.5vw,1rem);color:var(--muted);letter-spacing:.08em;line-height:1.9;max-width:540px;margin:0 auto 48px}

/* ── PRODUCT CATEGORIES & GRID ── */
section{padding:120px 60px}
.category-section { margin-bottom: 80px; }
.category-header { font-family: 'Playfair Display', serif; font-size: 2rem; font-style: italic; color: var(--gold-light); margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid rgba(201,169,110,0.15); display: flex; align-items: center; justify-content: space-between; }
.category-count { font-family: 'DM Sans', sans-serif; font-size: 10px; font-style: normal; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.product-card{background:var(--surface);position:relative;overflow:hidden;border:1px solid rgba(201,169,110,.07);transition:all .4s}
.product-card:hover{border-color:rgba(201,169,110,.3);transform:translateY(-5px)}
.product-img-wrap{height:280px;background:#1a1714;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.product-img-wrap img{width:100%;height:100%;object-fit:cover}
.product-overlay{position:absolute;inset:0;background:rgba(8,8,8,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .35s}
.product-card:hover .product-overlay{opacity:1}
.shop-btn{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:12px 20px;text-decoration:none;font-weight:600}
.product-info{padding:20px}
.product-brand{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block}
.product-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream);margin-bottom:10px}
.product-price{color:var(--gold-light);font-weight:500}

/* ── ADMIN OVERLAY ── */
#admin-overlay{position:fixed;inset:0;z-index:10000;background:rgba(4,3,2,.98);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;padding:60px 20px;overflow-y:auto}
#admin-overlay.open{display:flex}
.admin-wrap{width:100%;max-width:700px}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;border-bottom:1px solid rgba(201,169,110,.2);padding-bottom:20px}
.admin-tab-row{display:flex;gap:10px;margin-bottom:30px}
.admin-tab{padding:10px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(201,169,110,.2);color:var(--muted);cursor:pointer;font-size:10px;letter-spacing:.2em;text-transform:uppercase}
.admin-tab.active{background:var(--gold);color:var(--black)}
.form-field{margin-bottom:20px;display:flex;flex-direction:column;gap:8px}
.form-label{font-size:9px;text-transform:uppercase;color:var(--gold);letter-spacing:.2em}
.form-input, .form-select{background:rgba(255,255,255,.05);border:1px solid rgba(201,169,110,.2);padding:12px;color:white;outline:none}
.form-input:focus{border-color:var(--gold)}
.add-btn{width:100%;padding:15px;background:var(--gold);border:none;font-weight:700;text-transform:uppercase;letter-spacing:.2em;cursor:pointer}
#gate-error{color:#ff6b6b;font-size:12px;margin-top:10px}

/* Responsive */
@media(max-width:1024px){ .products-grid{grid-template-columns:repeat(2,1fr);} }
@media(max-width:600px){ .products-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div id="grain"></div>
<div id="v-cursor"></div>
<div id="v-cursor-ring"></div>

<div id="admin-overlay">
  <div class="admin-wrap">
    <div class="admin-header">
      <h2 style="font-family:'Cinzel'; letter-spacing:0.3em;">VELOURA <span>ADMIN</span></h2>
      <button onclick="closeAdmin()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; cursor:pointer;">CLOSE</button>
    </div>

    <div id="admin-gate">
      <p style="margin-bottom:20px; color:var(--muted);">Security Access Required</p>
      <input type="password" id="gate-pass" class="form-input" placeholder="Password" style="width:100%; margin-bottom:10px;">
      <button onclick="unlockAdmin()" class="add-btn">Login</button>
      <div id="gate-error"></div>
    </div>

    <div id="admin-content" style="display:none;">
      <div class="admin-tab-row">
        <button class="admin-tab active" onclick="showTab('add')">Add Product</button>
        <button class="admin-tab" onclick="showTab('manage')">Manage</button>
      </div>

      <div id="tab-add">
        <div class="form-field">
            <label class="form-label">Amazon Product URL</label>
            <input type="text" id="f-url" class="form-input" placeholder="Paste Amazon link here...">
        </div>
        <div class="form-field">
            <label class="form-label">Category</label>
            <select id="f-category" class="form-select">
                <option>Everyday Skin Care Tips</option>
                <option>Top Makeup Picks</option>
                <option>Perfume & Fragrance Picks</option>
                <option>Nail & Hand Care Must-Haves</option>
                <option>Healthy Hair Care Routines</option>
                <option>Growth Tips</option>
                <option>Best Hair Tools on Amazon</option>
                <option>Best Amazon Finds</option>
            </select>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="form-field"><label class="form-label">Brand</label><input type="text" id="f-brand" class="form-input"></div>
            <div class="form-field"><label class="form-label">Price</label><input type="text" id="f-price" class="form-input"></div>
        </div>
        <div class="form-field"><label class="form-label">Product Name</label><input type="text" id="f-name" class="form-input"></div>
        <div class="form-field"><label class="form-label">Image URL</label><input type="text" id="f-img" class="form-input" placeholder="Right-click Amazon image > Copy Image Address"></div>
        
        <button onclick="addProduct()" class="add-btn">Add to Website</button>
      </div>

      <div id="tab-manage" style="display:none;">
          <div id="manage-list"></div>
      </div>
    </div>
  </div>
</div>

<nav id="nav">
  <a class="nav-logo" id="logo-trigger">VELO<span>U</span>RA</a>
  <ul class="nav-links">
    <li><a href="#hero">Home</a></li>
    <li><a href="#products">The Edit</a></li>
    <li><a href="#about">Philosophy</a></li>
  </ul>
  <a href="#newsletter" class="nav-cta">Subscribe</a>
</nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1 class="hero-title">Obsession<br><em>Luxury Decoded.</em></h1>
    <p class="hero-sub">The definitive curation of beauty, fragrance, and skin science. Each product earned its place through results, not trends.</p>
  </div>
</section>

<section id="products">
  <div id="products-container">
    </div>
</section>

<script>
/* ── STATE & STORAGE ── */
const DEFAULT_PASS = 'veloura2025';
const STORE_KEY = 'vl_prods_v2';
let products = JSON.parse(localStorage.getItem(STORE_KEY)) || [];

/* ── CURSOR LOGIC (EXCLUSION BLENDING) ── */
const dot = document.getElementById('v-cursor');
const ring = document.getElementById('v-cursor-ring');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX; mouseY = e.clientY;
    dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
    dot.style.transform = `translate(-50%, -50%)`;
});

function animateCursor() {
    ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15;
    ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
    ring.style.transform = `translate(-50%, -50%)`;
    requestAnimationFrame(animateCursor);
}
animateCursor();

// Hover detection
document.addEventListener('mouseover', (e) => {
    if (e.target.closest('a, button, .product-card, select, input')) {
        document.body.classList.add('v-hovering');
    } else {
        document.body.classList.remove('v-hovering');
    }
});

/* ── ADMIN ACCESS ── */
function openAdmin() { document.getElementById('admin-overlay').classList.add('open'); }
function closeAdmin() { document.getElementById('admin-overlay').classList.remove('open'); renderProducts(); }

// Secret Shortcut: Ctrl+Shift+A
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'a') openAdmin();
});

// Logo Click 5x Access
let clicks = 0;
document.getElementById('logo-trigger').addEventListener('click', () => {
    clicks++;
    if(clicks >= 5) { clicks=0; openAdmin(); }
    setTimeout(() => clicks = 0, 2000);
});

function unlockAdmin() {
    const p = document.getElementById('gate-pass').value;
    if(p === DEFAULT_PASS) {
        document.getElementById('admin-gate').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
    } else {
        document.getElementById('gate-error').textContent = "Incorrect Access Key";
    }
}

/* ── PRODUCT LOGIC ── */
function extractASIN(url) {
    const m = url.match(/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
    return m ? m[1] : null;
}

function addProduct() {
    const url = document.getElementById('f-url').value;
    const asin = extractASIN(url);
    if(!asin) return alert("Invalid Amazon URL");

    const newProd = {
        asin: asin,
        category: document.getElementById('f-category').value,
        brand: document.getElementById('f-brand').value,
        name: document.getElementById('f-name').value,
        price: document.getElementById('f-price').value,
        img: document.getElementById('f-img').value || 'https://via.placeholder.com/300',
        id: Date.now()
    };

    products.push(newProd);
    localStorage.setItem(STORE_KEY, JSON.stringify(products));
    alert("Product added successfully!");
    renderManageList();
}

function deleteProduct(id) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem(STORE_KEY, JSON.stringify(products));
    renderManageList();
}

function renderProducts() {
    const container = document.getElementById('products-container');
    container.innerHTML = '';
    
    const categories = [...new Set(products.map(p => p.category))];
    
    categories.forEach(cat => {
        const catProds = products.filter(p => p.category === cat);
        const section = document.createElement('div');
        section.className = 'category-section';
        section.innerHTML = `
            <div class="category-header">
                <span>${cat}</span>
                <span class="category-count">${catProds.length} Items</span>
            </div>
            <div class="products-grid">
                ${catProds.map(p => `
                    <div class="product-card">
                        <div class="product-img-wrap">
                            <img src="${p.img}" alt="${p.name}">
                            <div class="product-overlay">
                                <a href="https://www.amazon.com/dp/${p.asin}?tag=rpamazon0db-20" target="_blank" class="shop-btn">Shop on Amazon</a>
                            </div>
                        </div>
                        <div class="product-info">
                            <span class="product-brand">${p.brand}</span>
                            <h3 class="product-name">${p.name}</h3>
                            <div class="product-price">${p.price}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(section);
    });
}

function renderManageList() {
    const list = document.getElementById('manage-list');
    list.innerHTML = products.map(p => `
        <div style="display:flex; align-items:center; gap:15px; background:rgba(255,255,255,0.05); padding:10px; margin-bottom:10px; border:1px solid rgba(201,169,110,0.2);">
            <img src="${p.img}" style="width:50px; height:50px; object-fit:cover;">
            <div style="flex:1;">
                <div style="font-size:11px; color:var(--gold);">${p.brand}</div>
                <div style="font-size:13px;">${p.name}</div>
            </div>
            <button onclick="deleteProduct(${p.id})" style="background:#ff4747; color:white; border:none; padding:5px 10px; cursor:pointer;">Delete</button>
        </div>
    `).join('');
}

function showTab(tab) {
    document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
    document.getElementById('tab-manage').style.display = tab === 'manage' ? 'block' : 'none';
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(tab)));
    if(tab === 'manage') renderManageList();
}

// Initial Load
renderProducts();

// Navbar effect
window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});
</script>

</body>
</html>
