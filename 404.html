<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Veloura</title>
  <script>
    // GitHub Pages SPA Redirect Fix
    // Encodes the full URL path into a query string so index.html can decode it
    var segmentCount = 0; // Set to 1 if using a Project Page (e.g. username.github.io/repo)
                          // Set to 0 if using a Custom Domain (e.g. veloura.com)

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
      l.pathname.slice(1).split('/').join('~and~') +
      (l.search ? '~and~' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body>
  <!-- Redirecting... -->
</body>
</html>
