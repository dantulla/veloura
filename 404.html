<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>

<script>
(function(){

  const path =
    window.location.pathname +
    window.location.search +
    window.location.hash;

  sessionStorage.setItem("redirect_path", path);

  window.location.replace("/");

})();
</script>

</head>

<body>
Redirecting...
</body>
</html>
